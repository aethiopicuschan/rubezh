name: Rubezh External Test Package Linter
description: Enforce external test packages in Go test files

branding:
  icon: shield
  color: blue

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false

    - name: Build and run Rubezh
      shell: bash
      run: |
        extension=""
        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          extension=".exe"
        fi

        binary="${RUNNER_TEMP}/rubezh${extension}"
        go -C "${GITHUB_ACTION_PATH}" build -o "${binary}" .
        "${binary}" ./...

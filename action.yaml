name: Rubezh External Test Package Linter
description: Enforce external test packages in Go test files

branding:
  icon: shield
  color: blue

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false

    - name: Install and run Rubezh
      shell: bash
      env:
        RUBEZH_VERSION: ${{ github.action_ref }}
      run: |
        extension=""
        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          extension=".exe"
        fi

        version="${RUBEZH_VERSION:-latest}"
        GOBIN="${RUNNER_TEMP}" go install "github.com/aethiopicuschan/rubezh@${version}"
        "${RUNNER_TEMP}/rubezh${extension}" ./...
